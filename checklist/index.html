<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>手続きチェックリスト | SR Office</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#F1F5F9;min-height:100vh;font-size:13px;color:#1E293B;}

/* ナビ */
#nav{background:#0F172A;height:50px;display:flex;align-items:center;padding:0 20px;gap:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4);}
#nav .brand{color:#fff;font-size:14px;font-weight:700;padding-right:20px;border-right:1px solid rgba(255,255,255,.15);margin-right:8px;white-space:nowrap;}
.ntab{padding:0 18px;height:50px;display:flex;align-items:center;color:rgba(255,255,255,.6);font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;}
.ntab:hover{color:#fff;background:rgba(255,255,255,.06);}
.ntab.on{color:#fff;border-bottom-color:#3B82F6;background:rgba(59,130,246,.1);}
#nav .sync{margin-left:auto;font-size:10px;color:rgba(255,255,255,.45);}

/* レイアウト */
#app{display:flex;height:calc(100vh - 50px);}

/* サイドバー */
#sb{width:220px;background:#1E293B;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
#sb-top{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);}
#btn-new{width:100%;background:#2563EB;border:none;color:#fff;padding:8px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:background .15s;}
#btn-new:hover{background:#1D4ED8;}
#sb-filter{padding:8px 12px 4px;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid rgba(255,255,255,.08);}
.sf-btn{background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit;text-align:left;transition:all .12s;}
.sf-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.sf-btn.on{border-color:transparent;color:#fff;font-weight:700;}
#sb-list{flex:1;overflow-y:auto;padding:6px 0;}
#sb-list::-webkit-scrollbar{width:3px;}
#sb-list::-webkit-scrollbar-thumb{background:#334155;}
.si{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.si:hover{background:rgba(255,255,255,.05);}
.si.on{background:rgba(37,99,235,.2);border-left-color:#3B82F6;}
.si-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;display:inline-block;margin-bottom:2px;}
.si-co{color:#F1F5F9;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-name{color:#94A3B8;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.si-row{display:flex;align-items:center;gap:4px;margin-top:3px;}
.si-pb{flex:1;background:rgba(255,255,255,.1);border-radius:2px;height:3px;overflow:hidden;}
.si-pf{height:100%;border-radius:2px;transition:width .3s;}
.si-pct{color:#94A3B8;font-size:9px;min-width:24px;text-align:right;}

/* メイン */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* ダッシュボード */
#vd{flex:1;overflow-y:auto;padding:18px 20px;}
#vd::-webkit-scrollbar{width:5px;}
#vd::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
.vd-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.vd-head h2{font-size:16px;font-weight:700;color:#0F172A;}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.sm{background:#fff;border-radius:8px;padding:10px 14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sm-n{font-size:22px;font-weight:700;}
.sm-l{font-size:10px;color:#64748B;margin-top:2px;}
.status-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.stf{padding:5px 12px;border-radius:16px;border:2px solid transparent;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px;}
.stf.off{background:#fff!important;color:#64748B!important;border-color:#E2E8F0!important;}
.stf-cnt{background:rgba(0,0,0,.12);border-radius:8px;padding:1px 6px;font-size:10px;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;}
.dc{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;border:2px solid transparent;transition:all .15s;}
.dc:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
.dc-head{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px;}
.dc-ico{font-size:20px;line-height:1;}
.dc-inf{flex:1;min-width:0;}
.dc-co{font-weight:700;color:#0F172A;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dc-sub{font-size:10px;color:#64748B;margin-top:1px;}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.dc-proc{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;}
.dc-pct{font-size:18px;font-weight:700;}
.st-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:6px;}
.dc-bar{background:#E2E8F0;border-radius:3px;height:5px;overflow:hidden;margin-bottom:4px;}
.dc-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.dc-bl{font-size:10px;color:#64748B;display:flex;justify-content:space-between;}

/* 待ち中情報 */
.waiting-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.wchip{font-size:9px;padding:2px 7px;border-radius:4px;background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;font-weight:600;}

/* ステータスドロップダウン */
.st-sel{width:100%;font-size:11px;font-family:inherit;border:1px solid #E2E8F0;border-radius:6px;padding:4px 6px;cursor:pointer;background:#F8FAFC;color:#475569;margin-top:8px;}

/* アクション */
.dc-acts{display:flex;gap:6px;margin-top:8px;}
.dc-btn{flex:1;padding:5px;border-radius:5px;border:none;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s;}
.dc-open{background:#EFF6FF;color:#2563EB;}
.dc-open:hover{background:#DBEAFE;}
.dc-del{background:#FEF2F2;color:#DC2626;}
.dc-del:hover{background:#FEE2E2;}

/* チェックリスト */
#vc{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#cl-head{background:#fff;padding:12px 18px;border-bottom:1px solid #E2E8F0;flex-shrink:0;}
.cl-r1{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.cl-back{background:#F1F5F9;border:none;color:#475569;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;}
.cl-back:hover{background:#E2E8F0;}
.cl-co{font-size:15px;font-weight:700;color:#0F172A;}
.cl-name{font-size:12px;color:#64748B;}
.cl-pct{font-size:18px;font-weight:700;margin-left:auto;}
.cl-bar{background:#E2E8F0;border-radius:3px;height:6px;overflow:hidden;}
.cl-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.cl-meta{display:flex;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap;}
.cl-meta .label{font-size:11px;color:#64748B;}

/* 待ち中パネル（チェックリスト上部） */
#wait-panel{padding:10px 18px;background:#FFFBEB;border-bottom:2px solid #FDE68A;flex-shrink:0;}
.wait-panel-title{font-size:11px;font-weight:700;color:#92400E;margin-bottom:8px;}
.wait-checks{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.wait-check{display:flex;align-items:center;gap:5px;font-size:11px;color:#78350F;cursor:pointer;}
.wait-check input{accent-color:#D97706;width:13px;height:13px;}
.wait-note{margin-top:8px;}
.wait-note label{font-size:10px;color:#92400E;display:block;margin-bottom:3px;}
.wait-note textarea{width:100%;font-size:11px;font-family:inherit;border:1px solid #FDE68A;border-radius:5px;padding:5px 8px;background:#FFFEF7;resize:vertical;min-height:36px;outline:none;color:#78350F;}

/* 担当者 */
#tantosha-panel{padding:8px 18px;background:#F0F9FF;border-bottom:1px solid #BAE6FD;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.tanto-label{font-size:11px;color:#0369A1;font-weight:600;white-space:nowrap;}
.tanto-input{flex:1;max-width:200px;font-size:11px;font-family:inherit;border:1px solid #BAE6FD;border-radius:5px;padding:4px 8px;background:#fff;outline:none;color:#0369A1;}
.tanto-hist{font-size:10px;color:#64748B;flex:1;}
.tanto-hist span{background:#E0F2FE;color:#0369A1;padding:2px 7px;border-radius:4px;margin-right:4px;font-weight:600;}

/* チェックリスト本体 */
#cl-body{flex:1;overflow-y:auto;padding:10px 16px 20px;}
#cl-body::-webkit-scrollbar{width:5px;}
#cl-body::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
.sec-head{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:0 6px 6px 0;margin:8px 0 4px;}
.sec-title{font-weight:700;font-size:12px;}
.sec-cnt{margin-left:auto;font-size:10px;color:#64748B;font-weight:600;}
.task-card{background:#fff;border:1px solid #E2E8F0;border-radius:7px;margin-bottom:3px;overflow:hidden;transition:border-color .15s,background .15s;}
.task-card.done{background:#F0FDF4;border-color:#86EFAC;}
.task-row{display:flex;align-items:flex-start;padding:8px 10px;gap:7px;}
.task-num{min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;}
.task-cb{margin-top:2px;width:14px;height:14px;cursor:pointer;flex-shrink:0;}
.task-info{flex:1;}
.task-label{color:#1E293B;font-weight:500;font-size:12px;line-height:1.4;}
.task-label.done{color:#166534;text-decoration:line-through;}
.task-warn{margin-top:3px;padding:3px 7px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:3px;font-size:10px;color:#C2410C;line-height:1.5;}
.task-toggle{background:none;border:none;color:#94A3B8;font-size:12px;cursor:pointer;padding:0 3px;flex-shrink:0;}
.task-toggle:hover{color:#475569;}
.task-note{padding:5px 10px 7px 47px;background:#F8FAFC;border-top:1px solid #E2E8F0;font-size:11px;color:#475569;line-height:1.6;}
.empty-state{text-align:center;padding:60px 20px;color:#94A3B8;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;font-weight:700;color:#475569;margin-bottom:6px;}

/* モーダル */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
.ov.hidden{display:none;}
.mbox{background:#fff;border-radius:12px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;}
.mt{font-size:15px;font-weight:700;color:#0F172A;margin-bottom:16px;}
.fg{margin-bottom:12px;}
.fl{font-size:11px;color:#64748B;display:block;margin-bottom:3px;font-weight:600;}
.fi{width:100%;padding:7px 10px;border:1px solid #CBD5E1;border-radius:6px;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;}
.fi:focus{border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,246,.12);}
.req{color:#DC2626;}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
.po{padding:7px 9px;border:2px solid #E2E8F0;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:5px;background:#fff;font-family:inherit;font-size:11px;font-weight:500;color:#475569;transition:all .12s;text-align:left;}
.po:hover{border-color:#CBD5E1;background:#F8FAFC;}
.mbtns{display:flex;gap:8px;margin-top:16px;}
.bcn{flex:1;padding:8px;border:1px solid #CBD5E1;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;}
.bcn:hover{background:#F8FAFC;}
.bsb{flex:1;padding:8px;border:none;border-radius:6px;background:#2563EB;color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;}
.bsb:hover{background:#1D4ED8;}
.bsb:disabled{background:#CBD5E1;cursor:default;}

/* 用語集 */
.gl-box{max-height:70vh;overflow-y:auto;}
.gl-head{display:flex;align-items:center;margin-bottom:14px;}
.gl-head h3{flex:1;font-size:15px;font-weight:700;}
.gl-x{background:none;border:none;font-size:18px;cursor:pointer;color:#94A3B8;}
.gl-item{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #F1F5F9;}
.gl-item:last-child{border:none;}
.gl-term{font-weight:700;font-size:12px;color:#1E293B;margin-bottom:2px;}
.gl-def{font-size:11px;color:#64748B;line-height:1.6;}

/* トースト */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#0F172A;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateY(20px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* レスポンシブ */
@media(max-width:800px){
  #sb{display:none;}
  .summary{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<div id="nav">
  <div class="brand">⚖️ SR Office</div>
  <div class="ntab on" id="tab-cl" onclick="showView('d')">📁 手続きチェックリスト</div>
  <div class="ntab" id="tab-gl" onclick="openModal('ov-gl')">📖 用語集</div>
  <div id="sync-status" class="sync">🔄 接続中...</div>
</div>

<div id="app">
  <!-- サイドバー -->
  <div id="sb">
    <div id="sb-top">
      <button id="btn-new" onclick="openModal('ov-new')">＋ 新規案件</button>
    </div>
    <div id="sb-filter">
      <button class="sf-btn on" id="sf-all" onclick="setSbFilter('all')">すべて</button>
      <button class="sf-btn" id="sf-none" onclick="setSbFilter('none')" style="border-left:3px solid #6B7280;">未手続</button>
      <button class="sf-btn" id="sf-wait" onclick="setSbFilter('wait')" style="border-left:3px solid #D97706;">待ち中</button>
      <button class="sf-btn" id="sf-apply" onclick="setSbFilter('apply')" style="border-left:3px solid #D97706;">申請済</button>
      <button class="sf-btn" id="sf-kobunsho" onclick="setSbFilter('kobunsho')" style="border-left:3px solid #7C3AED;">公文書待ち</button>
      <button class="sf-btn" id="sf-done" onclick="setSbFilter('done')" style="border-left:3px solid #059669;">完了</button>
    </div>
    <div id="sb-list"></div>
  </div>

  <!-- メインエリア -->
  <div id="main">
    <!-- ダッシュボード -->
    <div id="vd">
      <div class="vd-head">
        <h2>📋 手続き案件一覧</h2>
        <button class="bcn" style="padding:5px 14px;font-size:11px;border-radius:6px;" onclick="openModal('ov-new')">＋ 新規案件</button>
      </div>
      <div class="summary" id="summary"></div>
      <div class="status-filters" id="status-filters"></div>
      <div id="dash-content"></div>
    </div>

    <!-- チェックリスト -->
    <div id="vc" style="display:none;">
      <div id="cl-head">
        <div class="cl-r1">
          <button class="cl-back" onclick="showView('d')">← 一覧へ</button>
          <span id="cl-proc-badge"></span>
          <span class="cl-co" id="cl-co"></span>
          <span class="cl-name" id="cl-name"></span>
          <span class="cl-pct" id="cl-pct"></span>
        </div>
        <div class="cl-bar"><div class="cl-bar-fill" id="cl-bar-fill"></div></div>
        <div class="cl-meta">
          <span class="label" id="cl-task-cnt"></span>
          <span id="cl-st-badge"></span>
          <span class="label">ステータス：</span>
          <select class="st-sel" style="width:auto;padding:3px 8px;" id="cl-st-sel" onchange="setStatusFromCL(this.value)"></select>
        </div>
      </div>
      <!-- 待ち中パネル -->
      <div id="wait-panel" style="display:none;">
        <div class="wait-panel-title">⏳ 待ち中の内容</div>
        <div class="wait-checks" id="wait-checks"></div>
        <div class="wait-note">
          <label>メモ（何を待っているか具体的に）</label>
          <textarea id="wait-memo" placeholder="例：○○様からの出勤簿が未着" oninput="saveWaitMemo(this.value)"></textarea>
        </div>
      </div>
      <!-- 担当者パネル -->
      <div id="tantosha-panel">
        <span class="tanto-label">今日の担当：</span>
        <input class="tanto-input" id="tanto-input" type="text" placeholder="氏名を入力" onkeydown="if(event.key==='Enter')saveTanto()">
        <button style="background:#0EA5E9;border:none;color:#fff;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;" onclick="saveTanto()">記録</button>
        <span class="tanto-hist" id="tanto-hist"></span>
      </div>
      <!-- チェックリスト本体 -->
      <div id="cl-body"></div>
    </div>
  </div>
</div>

<!-- 新規案件モーダル -->
<div class="ov hidden" id="ov-new">
  <div class="mbox">
    <div class="mt">＋ 新規案件</div>
    <div class="fg">
      <label class="fl">事業所名 <span class="req">*</span></label>
      <input class="fi" id="n-co" type="text" placeholder="〇〇株式会社" oninput="uNewBtn()">
    </div>
    <div class="fg">
      <label class="fl">対象者氏名</label>
      <input class="fi" id="n-na" type="text" placeholder="山田 太郎（任意）">
    </div>
    <div class="fg">
      <label class="fl">手続き種別 <span class="req">*</span></label>
      <div class="pg" id="proc-grid"></div>
    </div>
    <div class="mbtns">
      <button class="bcn" onclick="closeModal('ov-new')">キャンセル</button>
      <button class="bsb" id="n-submit" disabled onclick="createCase()">作成する</button>
    </div>
  </div>
</div>

<!-- 用語集モーダル -->
<div class="ov hidden" id="ov-gl">
  <div class="mbox" style="max-width:500px;">
    <div class="gl-head">
      <h3>📖 用語集</h3>
      <button class="gl-x" onclick="closeModal('ov-gl')">×</button>
    </div>
    <div class="gl-box" id="gl-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// Supabase設定
// ============================================================
const SB_URL = 'https://mmcgxgzplvtenlyzxhty.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tY2d4Z3pwbHZ0ZW5seXp4aHR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODAwMTMsImV4cCI6MjA4OTM1NjAxM30.0qaVx5ymqB63YJ7rHQe0I56sqp3M8CVv4ZwRVmhjHWU';
const TABLE = 'checklist_cases';

const SB_HEADERS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json'
};

async function sbGet() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=*&order=created_at.asc`, { headers: SB_HEADERS });
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    return await r.json();
  } catch(e) { console.error('sbGet', e); return null; }
}

async function sbInsert(row) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(row)
    });
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    return (await r.json())[0];
  } catch(e) { console.error('sbInsert', e); return null; }
}

async function sbUpdate(id, data) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) { const t = await r.text(); throw new Error(t); }
    return true;
  } catch(e) { console.error('sbUpdate', e); return false; }
}

async function sbDelete(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${id}`, {
      method: 'DELETE', headers: SB_HEADERS
    });

let expanded = {};

let _lastSync = Date.now();

function gp(c) { return P[c.proc] || P['入社']; }
function allTasks(c) { return gp(c).sections.flatMap(s => s.tasks); }
function pct(c) { const a = allTasks(c); return a.length ? Math.round(a.filter(t => c.checks[t.id]).length / a.length * 100) : 0; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'}); }

// ============================================================
// Supabaseとの同期
// ============================================================
async function loadData() {
  setSyncStatus('🔄 読み込み中...');
  const rows = await sbGet();
  if (rows === null) {
    setSyncStatus('❌ 接続失敗（ローカルで動作中）');
    const local = localStorage.getItem('cl-cases');
    if (local) cases = JSON.parse(local);
  } else {
    cases = rows.map(r => ({
      ...r,
      id: String(r.id),
      checks: r.checks || {},
      waitFlags: r.wait_flags || {},
      waitMemo: r.wait_memo || '',
      tantoLog: r.tanto_log || [],
    }));
    _lastSync = Date.now();
    setSyncStatus('☁️ 同期済');
  }
  renderAll();
}

async function saveCase(c) {
  localStorage.setItem('cl-cases', JSON.stringify(cases));
  const payload = {
    company: c.company,
    name: c.name,
    proc: c.proc,
    status: c.status,
    checks: c.checks,
    wait_flags: c.waitFlags || {},
    wait_memo: c.waitMemo || '',
    tanto_log: c.tantoLog || [],
    updated_at: new Date().toISOString(),
  };
  const ok = await sbUpdate(c.id, payload);
  if (ok) { _lastSync = Date.now(); setSyncStatus('☁️ 保存済'); }
  else setSyncStatus('⚠️ 保存失敗（ローカルのみ）');
}

async function insertCase(c) {
  const payload = {
    company: c.company,
    name: c.name,
    proc: c.proc,
    status: c.status || 'none',
    checks: c.checks || {},
    wait_flags: c.waitFlags || {},
    wait_memo: c.waitMemo || '',
    tanto_log: c.tantoLog || [],
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };
  const row = await sbInsert(payload);
  if (row) {
    c.id = String(row.id);
    localStorage.setItem('cl-cases', JSON.stringify(cases));
    _lastSync = Date.now();
    setSyncStatus('☁️ 保存済');
    return true;
  }
  setSyncStatus('⚠️ 保存失敗（ローカルのみ）');
  return false;
}

async function removeCase(id) {
  cases = cases.filter(c => c.id !== id);
  localStorage.setItem('cl-cases', JSON.stringify(cases));
  await sbDelete(id);
  setSyncStatus('☁️ 削除済');
}

function setSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
}

// 5分ごとに自動同期
setInterval(async () => {
  const rows = await sbGet();
  if (rows) {
    cases = rows.map(r => ({
      ...r,
      checks: r.checks || {},
      waitFlags: r.wait_flags || {},
      waitMemo: r.wait_memo || '',
      tantoLog: r.tanto_log || [],
    }));
    _lastSync = Date.now();
    setSyncStatus('☁️ 同期済（自動）');
    renderAll();
    if (currentId && viewMode === 'c') renderChecklist();
  }
}, 5 * 60 * 1000);

// ============================================================
// ビュー切替
// ============================================================
function showView(v) {
  viewMode = v;
  document.getElementById('vd').style.display = v === 'd' ? '' : 'none';
  document.getElementById('vc').style.display = v === 'c' ? '' : 'none';
  if (v === 'd') renderDash();
  else renderChecklist();
}

function openChecklist(id) {
  currentId = id;
  expanded = {};
  showView('c');
  renderSidebar();
}

// ============================================================
// サイドバー
// ============================================================
function setSbFilter(f) {
  sbFilter = f;
  ['all','none','wait','apply','kobunsho','done'].forEach(k => {
    const el = document.getElementById('sf-'+k);
    if (el) el.classList.toggle('on', k === f);
  });
  renderSidebar();
}

function renderSidebar() {
  const filtered = sbFilter === 'all' ? cases : cases.filter(c => (c.status||'none') === sbFilter);
  const el = document.getElementById('sb-list');
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:12px;color:#64748B;font-size:10px;text-align:center;">該当する案件なし</div>';
    return;
  }
  el.innerHTML = filtered.map(c => {
    const p = gp(c), pt = pct(c), st = stInfo(c.status||'none');
    return `<div class="si${currentId===c.id&&viewMode==='c'?' on':''}" onclick="openChecklist('${c.id}')">
      <span class="si-badge" style="background:${p.color}22;color:${p.color}">${p.icon} ${esc(c.proc)}</span>
      <div class="si-co">${esc(c.company)}</div>
      ${c.name ? `<div class="si-name">${esc(c.name)}</div>` : ''}
      <div class="si-row">
        <div class="si-pb"><div class="si-pf" style="width:${pt}%;background:${p.color}"></div></div>
        <span class="si-pct">${pt}%</span>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// ダッシュボード
// ============================================================
function renderDash() {
  const counts = {};
  STATUSES.forEach(s => counts[s.key] = 0);
  cases.forEach(c => { counts[c.status||'none'] = (counts[c.status||'none']||0)+1; });

  // サマリ
  document.getElementById('summary').innerHTML =
    `<div class="sm" style="border-top:3px solid #1E293B"><div class="sm-n">${cases.length}</div><div class="sm-l">全案件</div></div>` +
    STATUSES.map(s => `<div class="sm" style="border-top:3px solid ${s.color}">
      <div class="sm-n" style="color:${s.color}">${counts[s.key]||0}</div>
      <div class="sm-l">${s.label}</div>
    </div>`).join('');

  // フィルタボタン
  document.getElementById('status-filters').innerHTML =
    `<button class="stf${dashFilter==='all'?'':' off'}" style="background:#1E293B;color:#fff;border-color:#1E293B" onclick="setDashFilter('all')">すべて <span class="stf-cnt">${cases.length}</span></button>` +
    STATUSES.map(s => `<button class="stf${dashFilter===s.key?'':' off'}" style="background:${s.bg};color:${s.color};border-color:${s.color}" onclick="setDashFilter('${s.key}')">${s.label} <span class="stf-cnt">${counts[s.key]||0}</span></button>`).join('');

  // カード
  const filtered = dashFilter === 'all' ? cases : cases.filter(c => (c.status||'none') === dashFilter);
  if (!filtered.length) {
    document.getElementById('dash-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">案件がありません</div><div style="font-size:12px;">「新規案件」ボタンから追加してください</div></div>`;
    return;
  }
  document.getElementById('dash-content').innerHTML = '<div class="dash-grid">' + filtered.map(c => {
    const p = gp(c), all = allTasks(c), dn = all.filter(t => c.checks[t.id]).length, pt = all.length ? Math.round(dn/all.length*100) : 0;
    const st = stInfo(c.status||'none');
    const waitChips = c.waitFlags && Object.keys(c.waitFlags).some(k=>c.waitFlags[k])
      ? `<div class="waiting-chips">${WAIT_ITEMS.filter(w=>c.waitFlags[w.key]).map(w=>`<span class="wchip">⏳ ${w.label}</span>`).join('')}</div>` : '';
    const tantoLast = c.tantoLog && c.tantoLog.length ? `<div style="font-size:10px;color:#64748B;margin-top:4px;">担当: ${esc(c.tantoLog[c.tantoLog.length-1].name)}</div>` : '';
    return `<div class="dc" onclick="openChecklist('${c.id}')">
      <div class="dc-head">
        <div class="dc-ico">${p.icon}</div>
        <div class="dc-inf">
          <div class="dc-co">${esc(c.company)}</div>
          <div class="dc-sub">${esc(c.name||'')}${c.name?' · ':''}${esc(c.created_at ? c.created_at.split('T')[0] : '')}</div>
        </div>
        <div class="dc-right">
          <span class="dc-proc" style="background:${p.color}18;color:${p.color}">${esc(c.proc)}</span>
          <span class="dc-pct" style="color:${p.color}">${pt}%</span>
        </div>
      </div>
      <span class="st-badge" style="background:${st.bg};color:${st.color}">● ${st.label}</span>
      ${waitChips}
      <div class="dc-bar"><div class="dc-bar-fill" style="width:${pt}%;background:${p.color}"></div></div>
      <div class="dc-bl"><span>${dn} / ${all.length} タスク完了</span></div>
      ${tantoLast}
      <select class="st-sel" onchange="setStatusFromDash('${c.id}',this.value)" onclick="event.stopPropagation()">
        ${STATUSES.map(s=>`<option value="${s.key}"${(c.status||'none')===s.key?' selected':''}>${s.label}</option>`).join('')}
      </select>
      <div class="dc-acts">
        <button class="dc-btn dc-open" onclick="event.stopPropagation();openChecklist('${c.id}')">☑ チェックリストを開く</button>
        <button class="dc-btn dc-del" onclick="event.stopPropagation();deleteCase('${c.id}')">🗑 削除</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function setDashFilter(f) { dashFilter = f; renderDash(); }

async function setStatusFromDash(id, val) {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  c.status = val;
  await saveCase(c);
  renderDash();
  renderSidebar();
}

// ============================================================
// チェックリスト
// ============================================================
function renderChecklist() {
  const c = cases.find(x => x.id === currentId);
  if (!c) { showView('d'); return; }
  const p = gp(c), all = allTasks(c), dn = all.filter(t => c.checks[t.id]).length, pt = all.length ? Math.round(dn/all.length*100) : 0;
  const st = stInfo(c.status||'none');

  // ヘッダー
  document.getElementById('cl-proc-badge').innerHTML = `<span style="background:${p.color}18;color:${p.color};padding:2px 9px;border-radius:6px;font-size:10px;font-weight:700;">${p.icon} ${esc(c.proc)}</span>`;
  document.getElementById('cl-co').textContent = c.company;
  document.getElementById('cl-name').textContent = c.name || '';
  document.getElementById('cl-pct').textContent = pt + '%';
  document.getElementById('cl-pct').style.color = p.color;
  document.getElementById('cl-bar-fill').style.width = pt + '%';
  document.getElementById('cl-bar-fill').style.background = p.color;
  document.getElementById('cl-task-cnt').textContent = `${dn} / ${all.length} タスク完了`;
  document.getElementById('cl-st-badge').innerHTML = `<span style="background:${st.bg};color:${st.color};padding:2px 9px;border-radius:8px;font-size:10px;font-weight:700;">● ${st.label}</span>`;
  document.getElementById('cl-st-sel').innerHTML = STATUSES.map(s => `<option value="${s.key}"${(c.status||'none')===s.key?' selected':''}>${s.label}</option>`).join('');

  // 待ち中パネル
  const isWait = (c.status||'none') === 'wait';
  document.getElementById('wait-panel').style.display = isWait ? '' : 'none';
  if (isWait) {
    document.getElementById('wait-checks').innerHTML = WAIT_ITEMS.map(w =>
      `<label class="wait-check">
        <input type="checkbox" ${c.waitFlags && c.waitFlags[w.key] ? 'checked' : ''} onchange="toggleWaitFlag('${w.key}',this.checked)">
        ${w.label}
      </label>`
    ).join('');
    document.getElementById('wait-memo').value = c.waitMemo || '';
  }

  // 担当者パネル
  const tantoHist = c.tantoLog && c.tantoLog.length
    ? c.tantoLog.slice(-3).map(t => `<span>${esc(t.name)}</span>`).join(' ')
    : '<span style="color:#94A3B8;">まだ記録なし</span>';
  document.getElementById('tanto-hist').innerHTML = tantoHist;
  document.getElementById('tanto-input').value = '';

  // チェックリスト本体
  let sn = 0, html = '';
  p.sections.forEach(sec => {
    const st2 = sec.tasks.length, sd = sec.tasks.filter(t => c.checks[t.id]).length;
    html += `<div class="sec-head" style="background:${p.color}18;border-left:4px solid ${p.color}">
      <span class="sec-title" style="color:${p.color}">${esc(sec.title)}</span>
      <span class="sec-cnt">${sd}/${st2}</span>
    </div>`;
    sec.tasks.forEach(task => {
      sn++;
      const ck = !!c.checks[task.id], ex = !!expanded[task.id];
      html += `<div class="task-card${ck?' done':''}">
        <div class="task-row">
          <div class="task-num" style="background:${ck?'#22C55E':p.color+'22'};color:${ck?'#fff':p.color}">${ck?'✓':sn}</div>
          <input type="checkbox" class="task-cb" ${ck?'checked':''} style="accent-color:${p.color}" onchange="toggleTask('${task.id}')">
          <div class="task-info">
            <div class="task-label${ck?' done':''}">${esc(task.label)}</div>
            ${task.warn ? `<div class="task-warn">${esc(task.warn)}</div>` : ''}
          </div>
          <button class="task-toggle" onclick="toggleNote('${task.id}')">${ex?'▲':'▼'}</button>
        </div>
        ${ex ? `<div class="task-note">💡 ${esc(task.note)}</div>` : ''}
      </div>`;
    });
  });
  document.getElementById('cl-body').innerHTML = html;
}

async function toggleTask(taskId) {
  const c = cases.find(x => x.id === currentId);
  if (!c) return;
  c.checks[taskId] = !c.checks[taskId];
  renderChecklist();
  renderSidebar();
  await saveCase(c);
  // 全タスク完了 → 自動で完了提案
  const all = allTasks(c);
  if (all.every(t => c.checks[t.id]) && (c.status||'none') !== 'done') {
    if (confirm('全タスクが完了しました。ステータスを「完了」に変更しますか？')) {
      c.status = 'done';
      await saveCase(c);
      renderChecklist();
      renderSidebar();
      toast('✅ 案件を完了にしました');
    }
  }
}

function toggleNote(taskId) {
  expanded[taskId] = !expanded[taskId];
  renderChecklist();
}

async function setStatusFromCL(val) {
  const c = cases.find(x => x.id === currentId);
  if (!c) return;
  c.status = val;
  await saveCase(c);
  renderChecklist();
  renderSidebar();
}

async function toggleWaitFlag(key, val) {
  const c = cases.find(x => x.id === currentId);
  if (!c) return;
  if (!c.waitFlags) c.waitFlags = {};
  c.waitFlags[key] = val;
  await saveCase(c);
}

let _waitMemoTimer = null;
function saveWaitMemo(val) {
  clearTimeout(_waitMemoTimer);
  _waitMemoTimer = setTimeout(async () => {
    const c = cases.find(x => x.id === currentId);
    if (!c) return;
    c.waitMemo = val;
    await saveCase(c);
  }, 800);
}

async function saveTanto() {
  const c = cases.find(x => x.id === currentId);
  if (!c) return;
  const name = document.getElementById('tanto-input').value.trim();
  if (!name) return;
  if (!c.tantoLog) c.tantoLog = [];
  c.tantoLog.push({ name, date: new Date().toLocaleDateString('ja-JP') });
  if (c.tantoLog.length > 10) c.tantoLog = c.tantoLog.slice(-10);
  document.getElementById('tanto-input').value = '';
  renderChecklist();
  await saveCase(c);
  toast(`📝 ${name} さんを担当として記録しました`);
}

// ============================================================
// 新規案件作成
// ============================================================
function uNewBtn() {
  document.getElementById('n-submit').disabled = !(document.getElementById('n-co').value.trim() && selProc);
}

function renderProcGrid() {
  selProc = null;
  document.getElementById('proc-grid').innerHTML = PROC_KEYS.map((k, i) => {
    const v = P[k];
    return `<button class="po" id="pob${i}" data-key="${esc(k)}" onclick="selP(${i})">${v.icon} ${esc(k)}</button>`;
  }).join('');
}

function selP(idx) {
  const btn = document.getElementById('pob'+idx);
  if (!btn) return;
  selProc = btn.getAttribute('data-key');
  PROC_KEYS.forEach((_,i) => {
    const b = document.getElementById('pob'+i);
    if (b) { b.style.borderColor='#E2E8F0'; b.style.color=''; b.style.background=''; }
  });
  const col = P[selProc].color;
  btn.style.borderColor = col;
  btn.style.color = col;
  btn.style.background = col+'18';
  uNewBtn();
}

async function createCase() {
  const co = document.getElementById('n-co').value.trim();
  const na = document.getElementById('n-na').value.trim();
  if (!co || !selProc) return;
  const c = {
    id: 'tmp_' + Date.now(),
    company: co, name: na, proc: selProc,
    status: 'none', checks: {}, waitFlags: {}, waitMemo: '', tantoLog: [],
    created_at: new Date().toISOString(),
  };
  cases.push(c);
  closeModal('ov-new');
  document.getElementById('n-co').value = '';
  document.getElementById('n-na').value = '';
  selProc = null;
  document.getElementById('n-submit').disabled = true;
  // Supabaseに保存（IDが確定してからUIを更新）
  const ok = await insertCase(c);
  if (ok) {
    toast('✅ 案件を作成しました');
    renderAll();
    openChecklist(c.id);
  } else {
    toast('⚠️ DB保存に失敗しました。テーブルの設定を確認してください。');
    renderAll();
  }
}

async function deleteCase(id) {
  if (!confirm('この案件を削除しますか？')) return;
  if (currentId === id) { currentId = null; showView('d'); }
  await removeCase(id);
  renderAll();
  toast('🗑 削除しました');
}

// ============================================================
// 用語集
// ============================================================
function renderGlossary() {
  document.getElementById('gl-content').innerHTML = Object.entries(GL).map(([t,d]) =>
    `<div class="gl-item"><div class="gl-term">${esc(t)}</div><div class="gl-def">${esc(d)}</div></div>`
  ).join('');
}

// ============================================================
// モーダル
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  if (id === 'ov-new') renderProcGrid();
  if (id === 'ov-gl') renderGlossary();
}
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });
});

// ============================================================
// トースト
// ============================================================
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================================================
// まとめてレンダリング
// ============================================================
function renderAll() {
  renderSidebar();
  if (viewMode === 'd') renderDash();
  else renderChecklist();
}

// ============================================================
// 初期化
// ============================================================
(async () => {
  await loadData();
})();
</script>
</body>
</html>
